name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        # This action handles Gradle installation + build cache. If the repo
        # doesn't ship a gradle-wrapper.jar (we don't — we generate it below),
        # it still works because it installs a system Gradle first.
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        # We deliberately don't commit gradle-wrapper.jar to the repo — it's a
        # 60KB binary that needs to match the Gradle version. Generating it
        # fresh on every build keeps the repo clean and ensures the wrapper
        # always matches what CI uses. Local Android Studio users run the same
        # command once after cloning.
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyWidget-debug
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # Tag pushes (v1.0, v1.2.3, etc.) also publish a GitHub Release
      # with the APK attached, so you can download it without logging in.
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
